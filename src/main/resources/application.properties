spring.application.name=shopwise-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/shopwise}
spring.datasource.username=${DB_USERNAME:shopwise}
spring.datasource.password=${DB_PASSWORD:shopwise}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=8h

shopwise.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
shopwise.invitation.expiration-hours=${INVITATION_EXPIRATION_HOURS:48}
shopwise.invitation.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Development bootstrap. Set BOOTSTRAP_ENABLED=false in production.
shopwise.bootstrap.enabled=${BOOTSTRAP_ENABLED:true}
shopwise.bootstrap.email=${BOOTSTRAP_EMAIL:owner@shopwise.local}
shopwise.bootstrap.password=${BOOTSTRAP_PASSWORD:Shopwise123!}
