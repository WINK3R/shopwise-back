services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopwise}
      POSTGRES_USER: ${POSTGRES_USER:-shopwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopwise}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - shopwise-postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${SHOPWISE_API_IMAGE:-shopwise-api:local}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shopwise}
      DB_USERNAME: ${POSTGRES_USER:-shopwise}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-shopwise}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      BOOTSTRAP_ENABLED: ${BOOTSTRAP_ENABLED:-true}
      BOOTSTRAP_EMAIL: ${BOOTSTRAP_EMAIL:-owner@shopwise.local}
      BOOTSTRAP_PASSWORD: ${BOOTSTRAP_PASSWORD:-Shopwise123!}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

volumes:
  shopwise-postgres-data:
